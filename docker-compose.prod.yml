services:
  vekolom:
    build:
      context: .
      target: prod
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_PORT}/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - default
      - vekolom-service-network
    command: >
      bash -lc "
        python utils/wait-for-services.py &&
        if [ \"$${ACCESS_LOG_ENABLED:-false}\" = \"true\" ]; then
          GUNICORN_ACCESS_ARGS='--access-logfile -';
        else
          GUNICORN_ACCESS_ARGS='--access-logfile /dev/null';
        fi &&
        uv run --no-sync gunicorn
          -k uvicorn.workers.UvicornWorker
          -w ${GUNICORN_WORKERS:-2}
          -b ${APP_HOST}:${APP_PORT}
          --timeout ${GUNICORN_TIMEOUT}
          --graceful-timeout ${GUNICORN_GRACEFUL_TIMEOUT}
          ${GUNICORN_ACCESS_ARGS}
          'app.main:app'
      "

  celery_vekolom:
    build:
      context: .
      target: prod
    networks:
      - default
      - vekolom-service-network

  celery_backup_vekolom:
    build:
      context: .
      target: prod
    networks:
      - default
      - vekolom-service-network

  celery_beat_vekolom:
    build:
      context: .
      target: prod
    networks:
      - default
      - vekolom-service-network

networks:
  default:
    driver: bridge

  vekolom-service-network:
    name: vekolom-service-network
    external: true
