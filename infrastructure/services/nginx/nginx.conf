# =============================================================================
# nginx.conf — глобальные настройки для всех приложений.
#
# Модульная структура:
#   nginx.conf                  — глобальные настройки, модули, сжатие, rate limits
#   snippets/                   — переиспользуемые фрагменты (shared между приложениями):
#       compression.conf            — Brotli + gzip
#       proxy_params.conf           — параметры проксирования
#       bot_protection.conf         — фильтрация вредоносных ботов (map на http-уровне)
#   apps/{app}/                 — конфиги конкретного приложения:
#       upstream.conf               — upstream-определение
#       locations.conf              — location-блоки
#       {dev,prod}/server.conf      — server-блок (env-специфичный)
#       {dev,prod}/security_headers.conf — заголовки безопасности
#   conf.d/                     — автоматически генерируется entrypoint.sh
#
# Приложения добавляются в apps/{app_name}/ — entrypoint активирует нужные.
# =============================================================================

# --- Brotli dynamic modules ---
load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;

worker_processes auto;
worker_rlimit_nofile 4096;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;


events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}


http {
    # --- Базовые настройки ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    large_client_header_buffers 4 16k;
    server_tokens off;

    # --- Rate limiting (глобально для всех приложений) ---
    # general: 15 req/s на IP — общий лимит для страниц и статики.
    limit_req_zone $binary_remote_addr zone=general:10m rate=15r/s;

    # api: 5 req/s на IP — строгий лимит для форм и API.
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # Зона для ограничения одновременных соединений с одного IP.
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # --- Bot protection (map на http-уровне — общий для всех приложений) ---
    include /etc/nginx/snippets/bot_protection.conf;

    # --- Compression (Brotli + gzip) ---
    include /etc/nginx/snippets/compression.conf;

    # --- Подключение site configs (генерируются entrypoint.sh) ---
    include /etc/nginx/conf.d/*.conf;
}
