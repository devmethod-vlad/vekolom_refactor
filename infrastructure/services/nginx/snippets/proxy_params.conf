# =============================================================================
# snippets/proxy_params.conf — параметры проксирования к FastAPI upstream.
#
# Эти директивы передают оригинальный IP, протокол и хост клиента
# в FastAPI. Без них request.client.host всегда будет 172.x.x.x (Docker IP),
# а request.url.scheme — всегда http.
# =============================================================================

# Оригинальный IP клиента (а не IP nginx-контейнера).
# FastAPI/Starlette читает этот заголовок через TrustedHostMiddleware.
proxy_set_header X-Real-IP       $remote_addr;

# Цепочка прокси, через которые прошёл запрос.
# Нужен для корректной работы rate limiting на уровне приложения.
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# Оригинальный протокол (http/https).
# FastAPI использует для генерации правильных URL (request.url_for).
proxy_set_header X-Forwarded-Proto $scheme;

# Оригинальный Host из запроса клиента.
# Без этого FastAPI увидит Host: vekolom:8001 вместо vekolom.com.
proxy_set_header Host $http_host;

# Отключаем автоматический редирект nginx при проксировании.
# FastAPI сам управляет редиректами (trailing slash и пр.).
proxy_redirect off;

# Таймауты проксирования.
# connect — время на установку соединения с upstream.
# send    — время на отправку запроса в upstream.
# read    — время на ожидание ответа от upstream.
# 60s хватает для тяжёлых страниц; если появятся долгие операции — увеличить.
proxy_connect_timeout 60s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Буфер для заголовков ответа upstream.
# Увеличиваем с дефолтных 4k — FastAPI может отправлять длинные Set-Cookie.
proxy_buffer_size       16k;
proxy_buffers           4 32k;
proxy_busy_buffers_size 64k;
