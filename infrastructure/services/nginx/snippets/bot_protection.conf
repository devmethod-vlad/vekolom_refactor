# =============================================================================
# snippets/bot_protection.conf — защита от вредоносных ботов и сканеров.
#
# Стратегия: блокируем ТОЛЬКО заведомо вредоносных ботов и типичные
# exploit-пути, НЕ трогая легитимных краулеров (Googlebot, YandexBot и пр.).
#
# Механизмы (от дешёвого к дорогому по CPU):
#   1. map $http_user_agent → блокировка по User-Agent (O(1), regex)
#   2. location-блоки      → закрытие exploit-путей (точное совпадение)
#   3. limit_req / limit_conn → rate limiting по IP (уже в nginx.conf)
#
# Почему НЕ используем IP-блокировку:
#   - Списки IP быстро устаревают.
#   - Ботнеты используют миллионы IP.
#   - Легитимные пользователи за NAT попадают под блокировку.
#
# Почему НЕ используем CAPTCHA/JS-challenge:
#   - Ухудшает UX для обычных пользователей.
#   - Ломает SEO (краулеры не проходят challenge).
#   - Для данного сайта избыточно.
# =============================================================================


# ---------------------------------------------------------------------------
# 1. Блокировка вредоносных ботов по User-Agent
# ---------------------------------------------------------------------------
# Результат: переменная $bad_bot = "1" для заблокированных UA, "0" для остальных.
# Используется в server-блоке: if ($bad_bot) { return 444; }
#
# 444 — специальный код nginx: закрывает соединение БЕЗ отправки ответа.
# Это экономит bandwidth и не даёт боту понять, что его обнаружили.
#
# Список составлен из реальных вредоносных ботов:
#   - Скрейперы контента (AhrefsBot, SemrushBot, MJ12bot, DotBot)
#   - Сканеры уязвимостей (Nikto, sqlmap, Nessus, OpenVAS)
#   - Спам-боты (Sogou, MegaIndex, BLEXBot)
#   - Утилиты массового скачивания (HTTrack, wget бот-режим)
#
# ⚠️  НЕ добавляйте сюда:
#   - Googlebot, YandexBot, Bingbot — это ЛЕГИТИМНЫЕ краулеры
#   - curl, wget, python-requests — используются для мониторинга и healthcheck
#   - Lighthouse, PageSpeed — инструменты тестирования
# ---------------------------------------------------------------------------
map $http_user_agent $bad_bot {
    default 0;

    # --- Агрессивные SEO-краулеры ---
    # Эти боты массово качают контент для коммерческих SEO-платформ,
    # создавая существенную нагрузку без пользы для сайта.
    ~*AhrefsBot          1;
    ~*SemrushBot         1;
    ~*MJ12bot            1;
    ~*DotBot             1;
    ~*BLEXBot            1;
    ~*MegaIndex          1;
    ~*Sogou              1;
    ~*PetalBot           1;
    ~*Bytespider         1;
    ~*GPTBot             1;
    ~*CCBot              1;
    ~*ClaudeBot          1;

    # --- Сканеры уязвимостей ---
    ~*Nikto              1;
    ~*sqlmap             1;
    ~*Nessus             1;
    ~*OpenVAS            1;
    ~*Acunetix           1;
    ~*WPScan             1;
    ~*ZmEu               1;
    ~*masscan            1;
    ~*Nmap               1;

    # --- Спам-боты и скрейперы ---
    ~*HTTrack            1;
    ~*Offline.Explorer   1;
    ~*WebCopier          1;
    ~*EmailCollector     1;
    ~*EmailSiphon        1;
    ~*EmailWolf          1;
    ~*Extractorpro       1;
    ~*Harvest            1;
    ~*Heritrix           1;

    # --- Пустой User-Agent ---
    # Легитимные браузеры ВСЕГДА отправляют UA. Пустой UA — признак
    # примитивного бота или скрипта. Блокируем.
    ""                   1;
}


# ---------------------------------------------------------------------------
# 2. Exploit-пути (location-блоки)
# ---------------------------------------------------------------------------
# Подключаются через include в server-блоке.
# Здесь определяем только map; location'ы — в vekolom.conf.
#
# Типичные exploit-пути, которые сканеры проверяют на каждом сайте:
#   /wp-admin/, /wp-login.php      — WordPress
#   /phpmyadmin/, /pma/            — phpMyAdmin
#   /.env, /.git/                  — конфиг-файлы и репозитории
#   /xmlrpc.php                    — WordPress XML-RPC (brute-force вектор)
#   /cgi-bin/                      — CGI (legacy exploit)
#   /config.php, /setup.php        — CMS-конфиги
# ---------------------------------------------------------------------------


# ---------------------------------------------------------------------------
# 3. Ограничение размера тела запроса
# ---------------------------------------------------------------------------
# Глобальный лимит — 5 MB. Достаточно для формы контактов.
# Для admin-загрузки файлов (TinyMCE, фото) лимит увеличивается
# в отдельном location /admin/ в vekolom.conf.
# ---------------------------------------------------------------------------
# client_max_body_size задаётся в server-блоке (vekolom.conf).
