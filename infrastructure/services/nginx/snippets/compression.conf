# =============================================================================
# snippets/compression.conf — Brotli + gzip сжатие.
#
# Приоритет: браузер, поддерживающий Brotli (Accept-Encoding: br),
# получит br-сжатый ответ. Остальные — gzip. Оба включены одновременно,
# nginx автоматически выбирает лучший по Accept-Encoding клиента.
#
# Brotli даёт ~15–20% лучшее сжатие, чем gzip, при сравнимой скорости.
# Это особенно заметно на текстовых ресурсах (HTML, CSS, JS, JSON, SVG).
# =============================================================================

# --- Brotli (on-the-fly сжатие) ---
brotli            on;
brotli_comp_level 6;       # 1–11; 6 — оптимальный баланс сжатие/CPU
brotli_min_length 256;     # Не сжимать ответы < 256 байт (overhead > выигрыш)
brotli_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/x-component
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/xhtml+xml
    application/x-javascript
    application/manifest+json
    image/svg+xml
    font/opentype
    font/ttf
    font/woff
    font/woff2;

# Brotli static: если рядом с файлом лежит .br-версия — отдаёт её напрямую,
# без затрат CPU на сжатие. Пресжатые файлы можно генерировать при деплое.
brotli_static on;

# --- gzip (fallback для старых клиентов) ---
gzip              on;
gzip_comp_level   5;       # 1–9; 5 — баланс сжатие/CPU
gzip_min_length   256;
gzip_vary         on;      # Добавляет Vary: Accept-Encoding — важно для CDN/прокси
gzip_proxied      any;     # Сжимать ответы от upstream (FastAPI) тоже

gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/x-component
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/xhtml+xml
    application/x-javascript
    application/manifest+json
    image/svg+xml
    font/opentype
    font/ttf;

# gzip_static: аналог brotli_static — отдаёт .gz-файлы, если есть.
gzip_static on;
