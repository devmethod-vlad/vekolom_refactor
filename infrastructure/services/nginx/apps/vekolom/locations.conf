# =============================================================================
# apps/vekolom/locations.conf — location-блоки приложения vekolom.
#
# Подключается (include) из server-блока (dev/server.conf или prod/server.conf).
# Все пути к файлам — /data/vekolom/ (монтируется в docker-compose).
#
# Upstream: vekolom_backend (определён в upstream.conf).
#
# Требования к server-блоку перед include:
#   - charset utf-8;
#   - client_max_body_size 5m;
#   - include .../active/security_headers.conf;
#   - if ($bad_bot) { return 444; }
#   - limit_req zone=general burst=30 nodelay;
#   - limit_conn addr 50;
# =============================================================================


# =====================================================================
# СТАТИКА: CSS, JS, шрифты, изображения интерфейса
# =====================================================================
location /static/ {
    alias /data/vekolom/static/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
    etag on;
    if_modified_since exact;

    # CORS для шрифтов
    location ~* \.(woff2?|ttf|otf|eot)$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, immutable";
        expires 365d;
    }
}

# --- Production-бандлы (dist/) — файлы с content-hash ---
location /static/dist/ {
    alias /data/vekolom/static/dist/;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}


# =====================================================================
# МЕДИА: загруженные пользователем изображения
# =====================================================================
location /media/ {
    alias /data/vekolom/media/;
    expires 7d;
    add_header Cache-Control "public";
    etag on;
    access_log off;
}


# =====================================================================
# PWA: Service Worker, manifest, иконки
# =====================================================================
location = /sw.js {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
    expires -1;
}

location = /static/pwa/manifest.json {
    alias /data/vekolom/static/pwa/manifest.json;
    add_header Cache-Control "public, max-age=3600";
    access_log off;
}

location = /static/pwa/pwa-register.js {
    alias /data/vekolom/static/pwa/pwa-register.js;
    add_header Cache-Control "public, max-age=86400";
    access_log off;
}


# =====================================================================
# SEO: robots.txt, sitemap.xml
# =====================================================================
location = /robots.txt {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    add_header Cache-Control "public, max-age=3600";
}

location = /sitemap.xml {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    add_header Cache-Control "public, max-age=3600";
}


# =====================================================================
# FAVICON
# =====================================================================
location = /favicon.ico {
    alias /data/vekolom/static/images/common/favicon.ico;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
    log_not_found off;
}


# =====================================================================
# ADMIN: панель администрирования (starlette-admin)
# =====================================================================
location /admin/ {
    client_max_body_size 50m;
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    add_header Cache-Control "no-store";
}

location /api/admin/ {
    client_max_body_size 50m;
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    add_header Cache-Control "no-store";
}

location /assets/tinymce/ {
    alias /data/vekolom/static/vendor/tinymce/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}


# =====================================================================
# PWA: SSE-стрим обновлений
# =====================================================================
location /pwa/ {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    brotli off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}


# =====================================================================
# EXPLOIT PATHS — блокировка типичных сканерских запросов
# =====================================================================
location ~* ^/(wp-admin|wp-login\.php|wp-content|wp-includes|xmlrpc\.php) {
    return 444;
}

location ~* ^/(phpmyadmin|pma|myadmin|mysql|dbadmin) {
    return 444;
}

location ~* ^/(\.env|\.git|\.svn|\.htaccess|\.htpasswd) {
    return 444;
}

location ~* ^/(config\.php|setup\.php|install\.php|cgi-bin) {
    return 444;
}

location ~* \.(sql|bak|orig|old|save|swp|dist|DS_Store)$ {
    return 444;
}


# =====================================================================
# OFFLINE PAGE (PWA fallback)
# =====================================================================
location = /offline/ {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
}


# =====================================================================
# ФОРМЫ: ужесточённый rate limiting для POST
# =====================================================================
location = /contacts/ {
    limit_req zone=api burst=5 nodelay;
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
}


# =====================================================================
# DEFAULT: все остальные запросы → FastAPI
# =====================================================================
location / {
    proxy_pass http://vekolom_backend;
    include /etc/nginx/snippets/proxy_params.conf;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}
