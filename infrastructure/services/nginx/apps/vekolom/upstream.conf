# =============================================================================
# apps/vekolom/upstream.conf — upstream-определение для vekolom.
#
# Имя контейнера 'vekolom' доступно через общую Docker-сеть
# vekolom-service-network. Одинаково для dev и prod.
# =============================================================================

upstream vekolom_backend {
    server vekolom:8001;
    keepalive 32;
}
