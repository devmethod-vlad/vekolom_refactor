# =============================================================================
# snippets/security_headers.conf — HTTP-заголовки безопасности.
#
# Эти заголовки добавляются ко всем ответам (и статика, и проксированные).
# Они не влияют на производительность, но значительно повышают безопасность.
#
# Проверить результат: https://securityheaders.com/?q=vekolom.com
# =============================================================================

# --- X-Content-Type-Options ---
# Запрещает браузеру «угадывать» MIME-тип ответа (MIME sniffing).
# Без этого заголовка браузер может интерпретировать CSS как JS и наоборот,
# что открывает вектор для XSS-атак через загруженные пользователем файлы.
add_header X-Content-Type-Options "nosniff" always;

# --- X-Frame-Options ---
# Запрещает встраивание сайта во фреймы на чужих доменах (clickjacking).
# SAMEORIGIN разрешает фреймы только на своём домене (нужно для admin iframe).
add_header X-Frame-Options "SAMEORIGIN" always;

# --- X-XSS-Protection ---
# Активирует встроенный XSS-фильтр браузера. mode=block — блокирует страницу
# целиком при обнаружении XSS, вместо попытки «почистить» опасный контент.
# Deprecated в современных браузерах (CSP лучше), но не вредит.
add_header X-XSS-Protection "1; mode=block" always;

# --- Referrer-Policy ---
# Контролирует, сколько информации о текущем URL передаётся в заголовке Referer
# при переходе на другой сайт. strict-origin-when-cross-origin:
#   - Свой сайт → полный URL (удобно для аналитики).
#   - Чужой сайт, HTTPS→HTTPS → только origin (https://vekolom.com).
#   - HTTPS→HTTP → ничего (не сливаем данные на небезопасные сайты).
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# --- Permissions-Policy ---
# Ограничивает доступ к API браузера. Разрешаем только то, что реально нужно:
#   - geolocation=() — отключаем (карта Google не запрашивает геолокацию пользователя).
#   - camera=(), microphone=() — не нужны.
#   - payment=() — платежей на сайте нет.
#   - interest-cohort=() — отключаем FLoC (Google Topics / tracking).
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;

# --- Content-Security-Policy ---
# CSP ограничивает источники загрузки ресурсов. Это главная защита от XSS.
#
# Разрешённые источники подобраны под реальные зависимости проекта:
#   - 'self'                   — свой домен
#   - 'unsafe-inline'          — inline <style> и <script> (Яндекс.Метрика, initMap)
#   - 'unsafe-eval'            — eval() (jQuery plugins, некоторые legacy скрипты)
#   - mc.yandex.ru             — Яндекс.Метрика
#   - www.google.com           — reCAPTCHA
#   - www.gstatic.com          — reCAPTCHA assets
#   - maps.googleapis.com      — Google Maps JS API
#   - maps.gstatic.com         — Google Maps tiles
#   - *.ggpht.com              — Google Maps Street View images
#
# TODO: при уходе от inline-скриптов — заменить 'unsafe-inline' на nonce/hash.
add_header Content-Security-Policy
    "default-src 'self'; "
    "script-src 'self' 'unsafe-inline' 'unsafe-eval' mc.yandex.ru www.google.com www.gstatic.com maps.googleapis.com; "
    "style-src 'self' 'unsafe-inline' fonts.googleapis.com; "
    "img-src 'self' data: mc.yandex.ru maps.googleapis.com maps.gstatic.com *.ggpht.com; "
    "font-src 'self' fonts.gstatic.com; "
    "connect-src 'self' mc.yandex.ru www.google.com maps.googleapis.com; "
    "frame-src www.google.com; "
    "object-src 'none'; "
    "base-uri 'self'; "
    "form-action 'self'; "
    always;

# --- Strict-Transport-Security (HSTS) ---
# Сообщает браузеру: «всегда используй HTTPS для этого домена».
# max-age=31536000 — 1 год; includeSubDomains — распространяется на поддомены.
# Раскомментируйте ПОСЛЕ настройки SSL и проверки, что HTTPS работает стабильно.
# ⚠️  Включение HSTS без рабочего SSL заблокирует доступ к сайту!
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
