# =============================================================================
# apps/vekolom/prod/server.conf — production server-блок для vekolom.com.
#
# Активируется entrypoint.sh при NGINX_ENV=prod.
# Копируется в /etc/nginx/conf.d/vekolom.conf.
#
# Upstream: vekolom_backend (определён в upstream.conf).
# Locations: /etc/nginx/apps/vekolom/locations.conf (общие для dev и prod).
# =============================================================================


# =============================================================================
# HTTP server (порт 80)
# =============================================================================
server {
    listen 80;
    server_name vekolom.com www.vekolom.com;

    # --- Redirect www → non-www ---
    if ($host = www.vekolom.com) {
        return 301 https://vekolom.com$request_uri;
    }

    # ╔═══════════════════════════════════════════════════════════════════════╗
    # ║  SSL REDIRECT — раскомментировать после получения сертификата.      ║
    # ╚═══════════════════════════════════════════════════════════════════════╝
    # return 301 https://vekolom.com$request_uri;

    # --- Общие настройки ---
    charset utf-8;
    client_max_body_size 5m;

    # Security headers (prod — активируется entrypoint.sh)
    include /etc/nginx/apps/vekolom/active/security_headers.conf;

    # --- Bot protection ---
    if ($bad_bot) {
        return 444;
    }

    # --- Rate limiting ---
    limit_req zone=general burst=30 nodelay;
    limit_conn addr 50;

    # --- Location-блоки ---
    include /etc/nginx/apps/vekolom/locations.conf;
}


