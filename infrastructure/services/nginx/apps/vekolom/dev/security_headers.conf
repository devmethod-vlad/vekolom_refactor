# =============================================================================
# local/security_headers.conf — HTTP-заголовки безопасности (localhost).
#
# Копия snippets/security_headers.conf с расширенным CSP:
#   - Добавлен localhost:5173 (Vite dev server) в script-src, style-src,
#     connect-src, img-src.
#   - Добавлен ws://localhost:5173 в connect-src (Vite HMR WebSocket).
#
# Подключается через volume mount в docker-compose.dev.yml:
#   ./nginx/local/security_headers.conf:/etc/nginx/snippets/security_headers.conf:ro
# =============================================================================

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;

# --- Content-Security-Policy (localhost + Vite dev server) ---
# Отличия от production:
#   - localhost:5173 добавлен в script-src, style-src, connect-src, img-src
#   - ws://localhost:5173 в connect-src для Vite HMR (Hot Module Replacement)
add_header Content-Security-Policy
    "default-src 'self'; "
    "script-src 'self' 'unsafe-inline' 'unsafe-eval' mc.yandex.ru www.google.com www.gstatic.com maps.googleapis.com http://localhost:5173; "
    "style-src 'self' 'unsafe-inline' fonts.googleapis.com http://localhost:5173; "
    "img-src 'self' data: mc.yandex.ru maps.googleapis.com maps.gstatic.com *.ggpht.com http://localhost:5173; "
    "font-src 'self' fonts.gstatic.com; "
    "connect-src 'self' mc.yandex.ru www.google.com maps.googleapis.com ws://localhost:5173 http://localhost:5173; "
    "frame-src www.google.com; "
    "object-src 'none'; "
    "base-uri 'self'; "
    "form-action 'self'; "
    always;

# HSTS отключён для localhost — без SSL нет смысла.
