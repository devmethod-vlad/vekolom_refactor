# =============================================================================
# apps/vekolom/dev/server.conf — dev server-блок для vekolom.local.
#
# Активируется entrypoint.sh при NGINX_ENV=dev.
# Копируется в /etc/nginx/conf.d/vekolom.conf.
#
# Отличия от prod:
#   - server_name: vekolom.local (вместо vekolom.com)
#   - Нет redirect www → non-www
#   - Нет SSL-блока
#   - security_headers.conf — dev-версия с расширенным CSP для Vite
#
# Для работы добавьте в /etc/hosts:
#   127.0.0.1 vekolom.local
# =============================================================================


server {
    listen 80;
    server_name vekolom.local;

    # --- Общие настройки ---
    charset utf-8;
    client_max_body_size 5m;

    # Security headers (dev — с расширенным CSP для Vite)
    include /etc/nginx/apps/vekolom/active/security_headers.conf;

    # --- Bot protection ---
    if ($bad_bot) {
        return 444;
    }

    # --- Rate limiting ---
    limit_req zone=general burst=30 nodelay;
    limit_conn addr 50;

    # --- Location-блоки (общие для dev и prod) ---
    include /etc/nginx/apps/vekolom/locations.conf;
}
