services:
  vekolom:
    container_name: vekolom
    env_file:
      - .env
    environment:
      SERVICE_NAME: vekolom
      LOG_TO_FILE: ${VEKOLOM_LOG_TO_FILE:-true}
      LOG_LEVEL: ${VEKOLOM_LOG_LEVEL:-INFO}
      LOG_FILE: /vekolom/logs/app.log
      ACCESS_LOG_ENABLED: ${VEKOLOM_ACCESS_LOG_ENABLED:-true}
      ACCESS_LOG_FILE: /vekolom/logs/access.log
      WAIT_FOR: postgresdb-vekolom
      WAIT_STRICT: "true"
    command:
      - bash
      - -c
      - |
        python utils/wait-for-services.py &&
        
        if [ "$${ACCESS_LOG_ENABLED:-true}" = "true" ]; then
          ACCESS_LOG_ARGS="--access-log"
        else
          ACCESS_LOG_ARGS="--no-access-log"
        fi
        
        exec uvicorn app.main:app \
          --host $${APP_HOST} \
          --port $${APP_PORT} \
          $${ACCESS_LOG_ARGS}
    expose:
      - ${APP_PORT}
    volumes:
      - ./:/vekolom
      - ${HOST_LOG_ROOT}/vekolom:/vekolom/logs
    restart: unless-stopped
    depends_on:
      celery_vekolom:
        condition: service_healthy

  celery_vekolom:
    container_name: celery_vekolom
    env_file:
      - .env
    environment:
      SERVICE_NAME: celery_vekolom
      LOG_TO_FILE: ${CELERY_VEKOLOM_LOG_TO_FILE:-true}
      LOG_LEVEL: ${CELERY_VEKOLOM_LOG_LEVEL:-INFO}
      LOG_FILE: /vekolom/logs/celery/celery.log
      WAIT_FOR: redis-vekolom
      WAIT_STRICT: "true"
    command:
      - bash
      - -c
      - |
        python utils/wait-for-services.py &&
        exec python -m celery -A app.infrastructure.celery.worker worker \
          --loglevel=${CELERY_VEKOLOM_LOG_LEVEL:-INFO} \
          --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - ./:/vekolom
      - ${HOST_LOG_ROOT}/vekolom/celery:/vekolom/logs/celery
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery.worker inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery_backup_vekolom:
    container_name: celery_backup_vekolom
    env_file:
      - .env
    environment:
      SERVICE_NAME: celery_backup_vekolom
      LOG_TO_FILE: ${CELERY_BACKUP_VEKOLOM_LOG_TO_FILE:-true}
      LOG_LEVEL: ${CELERY_BACKUP_VEKOLOM_LOG_LEVEL:-INFO}
      LOG_FILE: /vekolom/logs/celery/celery_backup_vekolom.log
      WAIT_FOR: redis-vekolom
      WAIT_STRICT: "true"
    command:
      - bash
      - -c
      - |
        python utils/wait-for-services.py &&
        exec python -m celery -A app.infrastructure.celery.worker worker \
          --loglevel=${CELERY_BACKUP_VEKOLOM_LOG_LEVEL:-INFO} \
          --queues=backups \
          --concurrency=${CELERY_BACKUP_WORKER_CONCURRENCY:-1}
    volumes:
      - ./:/vekolom
      - ${HOST_LOG_ROOT}/vekolom/celery:/vekolom/logs/celery
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery.worker inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery_beat_vekolom:
    container_name: celery_beat_vekolom
    env_file:
      - .env
    environment:
      SERVICE_NAME: celery_beat_vekolom
      LOG_TO_FILE: ${CELERY_BEAT_VEKOLOM_LOG_TO_FILE:-true}
      LOG_LEVEL: ${CELERY_BEAT_VEKOLOM_LOG_LEVEL:-INFO}
      LOG_FILE: /vekolom/logs/celery/celery_beat_vekolom.log
      WAIT_FOR: redis-vekolom
      WAIT_STRICT: "true"
    command:
      - bash
      - -c
      - |
        python utils/wait-for-services.py &&
        exec python -m celery -A app.infrastructure.celery.worker beat \
          --loglevel=${CELERY_BEAT_VEKOLOM_LOG_LEVEL:-INFO}
    volumes:
      - ./:/vekolom
      - ${HOST_LOG_ROOT}/vekolom/celery:/vekolom/logs/celery
    restart: unless-stopped
    depends_on:
      celery_backup_vekolom:
        condition: service_healthy
